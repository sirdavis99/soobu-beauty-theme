name: Deploy Documentation

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'The version tag to deploy (e.g. v1.0.0)'
        required: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate-version:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate version tag
        id: validate
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: ${VERSION}. Expected format: v*.*.*"
            exit 1
          fi
          if ! git tag -l "${VERSION}" | grep -q "${VERSION}"; then
            echo "❌ Git tag '${VERSION}' does not exist. Create the tag first before deploying."
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  resolve-version:
    runs-on: ubuntu-latest
    if: "github.event_name == 'pull_request' && github.event.pull_request.merged == true && (startsWith(github.event.pull_request.head.ref, 'release-please--') || startsWith(github.event.pull_request.head.ref, 'chore(main): release'))"
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract Release Version
        id: extract
        run: |
          echo "version=latest" >> "$GITHUB_OUTPUT"

  get-version:
    needs: [validate-version, resolve-version]
    if: always() && (needs.validate-version.result == 'success' || needs.resolve-version.result == 'success')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Establish Version Output
        id: meta
        run: |
          SELECTED_VERSION="${{ needs.validate-version.outputs.version || needs.resolve-version.outputs.version }}"
          echo "version=${SELECTED_VERSION}" >> "$GITHUB_OUTPUT"

  build:
    needs: get-version
    if: always() && needs.get-version.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Theme
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.get-version.outputs.version != 'latest' && needs.get-version.outputs.version || '' }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Create Documentation HTML
        run: |
          mkdir -p docs/.nojekyll
          
          # Create index.html with theme preview
          cat > docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Beauty Theme - Soobu E-Commerce</title>
              <script src="https://cdn.tailwindcss.com"></script>
              <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
              <style>
