                  </div>
              </header>

              <!-- Features -->
              <section id="features" class="py-20 container mx-auto px-6">
                  <h2 class="text-4xl font-bold text-center mb-12">Theme Features</h2>
                  <div class="grid md:grid-cols-3 gap-8">
                      <div class="bg-white p-8 rounded-2xl shadow-lg card transition-all duration-300">
                          <div class="w-14 h-14 bg-purple-100 rounded-xl flex items-center justify-center mb-6">
                              <i class="fas fa-palette text-2xl text-purple-600"></i>
                          </div>
