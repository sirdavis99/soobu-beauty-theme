                          <a href="https://github.com/sirdavis99/soobu-beauty-theme" class="hover:text-purple-200">
                              <i class="fab fa-github text-xl"></i>
                          </a>
                      </div>
                  </nav>
                  <div class="container mx-auto px-6 py-20 text-center">
                      <h1 class="text-5xl font-bold mb-6">Beautiful E-Commerce Theme</h1>
                      <p class="text-xl mb-8 text-purple-100">A stunning theme for beauty, cosmetics, and lifestyle stores on Soobu</p>
                      <div class="flex justify-center gap-4">
                          <a href="#installation" class="bg-white text-purple-600 px-8 py-3 rounded-full font-semibold hover:bg-purple-50 transition">
                              Get Started
                          </a>
                          <a href="https://github.com/sirdavis99/soobu-beauty-theme" class="border-2 border-white px-8 py-3 rounded-full font-semibold hover:bg-white hover:text-purple-600 transition">
                              View on GitHub
