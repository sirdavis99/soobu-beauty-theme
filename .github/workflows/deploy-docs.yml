                          <p class="text-gray-600">Clean and elegant UI with beautiful color schemes perfect for beauty and cosmetics stores.</p>
                      </div>
                      <div class="bg-white p-8 rounded-2xl shadow-lg card transition-all duration-300">
                          <div class="w-14 h-14 bg-pink-100 rounded-xl flex items-center justify-center mb-6">
                              <i class="fas fa-mobile-alt text-2xl text-pink-600"></i>
                          </div>
                          <h3 class="text-xl font-bold mb-4">Fully Responsive</h3>
                          <p class="text-gray-600">Looks perfect on all devices - desktop, tablet, and mobile.</p>
                      </div>
                      <div class="bg-white p-8 rounded-2xl shadow-lg card transition-all duration-300">
                          <div class="w-14 h-14 bg-indigo-100 rounded-xl flex items-center justify-center mb-6">
                              <i class="fas fa-sliders-h text-2xl text-indigo-600"></i>
                          </div>
                          <h3 class="text-xl font-bold mb-4">Easy Customization</h3>
                          <p class="text-gray-600">Configure everything through the theme settings panel - no coding required.</p>
                      </div>
                      <div class="bg-white p-8 rounded-2xl shadow-lg card transition-all duration-300">
                          <div class="w-14 h-14 bg-green-100 rounded-xl flex items-center justify-center mb-6">
                              <i class="fas fa-bolt text-2xl text-green-600"></i>
                          </div>
                          <h3 class="text-xl font-bold mb-4">Fast Loading</h3>
                          <p class="text-gray-600">Optimized for performance with clean code and minimal dependencies.</p>
                      </div>
                      <div class="bg-white p-8 rounded-2xl shadow-lg card transition-all duration-300">
                          <div class="w-14 h-14 bg-yellow-100 rounded-xl flex items-center justify-center mb-6">
                              <i class="fas fa-globe text-2xl text-yellow-600"></i>
                          </div>
                          <h3 class="text-xl font-bold mb-4">RTL Support</h3>
                          <p class="text-gray-600">Full right-to-left language support for Arabic, Hebrew, and more.</p>
                      </div>
                      <div class="bg-white p-8 rounded-2xl shadow-lg card transition-all duration-300">
                          <div class="w-14 h-14 bg-red-100 rounded-xl flex items-center justify-center mb-6">
                              <i class="fas fa-shopping-bag text-2xl text-red-600"></i>
                          </div>
                          <h3 class="text-xl font-bold mb-4">E-Commerce Ready</h3>
                          <p class="text-gray-600">Pre-built sections for products, cart, checkout, and customer accounts.</p>
                      </div>
                  </div>
              </section>

              <!-- Sections -->
              <section id="sections" class="py-20 bg-gray-100">
                  <div class="container mx-auto px-6">
                      <h2 class="text-4xl font-bold text-center mb-12">Pre-Built Sections</h2>
                      <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
                          <div class="bg-white p-6 rounded-xl shadow-md">
                              <i class="fas fa-images text-3xl text-purple-600 mb-4"></i>
                              <h3 class="font-semibold">Hero Slider</h3>
                              <p class="text-sm text-gray-500 mt-2">Beautiful banner carousel</p>
                          </div>
                          <div class="bg-white p-6 rounded-xl shadow-md">
                              <i class="fas fa-th-large text-3xl text-pink-600 mb-4"></i>
                              <h3 class="font-semibold">Product Categories</h3>
                              <p class="text-sm text-gray-500 mt-2">Grid display of categories</p>
                          </div>
                          <div class="bg-white p-6 rounded-xl shadow-md">
                              <i class="fas fa-star text-3xl text-yellow-600 mb-4"></i>
                              <h3 class="font-semibold">Featured Products</h3>
                              <p class="text-sm text-gray-500 mt-2">Showcase best products</p>
                          </div>
                          <div class="bg-white p-6 rounded-xl shadow-md">
                              <i class="fas fa-fire text-3xl text-orange-600 mb-4"></i>
                              <h3 class="font-semibold">Bestsellers</h3>
                              <p class="text-sm text-gray-500 mt-2">Popular products slider</p>
                          </div>
                          <div class="bg-white p-6 rounded-xl shadow-md">
                              <i class="fas fa-tags text-3xl text-green-600 mb-4"></i>
                              <h3 class="font-semibold">Brand Logos</h3>
                              <p class="text-sm text-gray-500 mt-2">Partner brands carousel</p>
                          </div>
                          <div class="bg-white p-6 rounded-xl shadow-md">
                              <i class="fas fa-quote-left text-3xl text-indigo-600 mb-4"></i>
                              <h3 class="font-semibold">Testimonials</h3>
                              <p class="text-sm text-gray-500 mt-2">Customer reviews section</p>
                          </div>
                          <div class="bg-white p-6 rounded-xl shadow-md">
                              <i class="fas fa-newspaper text-3xl text-blue-600 mb-4"></i>
                              <h3 class="font-semibold">Blog Section</h3>
                              <p class="text-sm text-gray-500 mt-2">Latest articles display</p>
                          </div>
                          <div class="bg-white p-6 rounded-xl shadow-md">
                              <i class="fas fa-envelope text-3xl text-red-600 mb-4"></i>
                              <h3 class="font-semibold">Newsletter</h3>
                              <p class="text-sm text-gray-500 mt-2">Email subscription form</p>
                          </div>
                      </div>
                  </div>
              </section>

              <!-- Installation -->
              <section id="installation" class="py-20 container mx-auto px-6">
                  <h2 class="text-4xl font-bold text-center mb-12">Installation</h2>
                  <div class="max-w-3xl mx-auto">
                      <div class="bg-gray-900 text-gray-100 p-8 rounded-2xl">
                          <h3 class="text-xl font-bold mb-6 text-white">Clone to Soobu Themes</h3>
                          <pre class="overflow-x-auto"><code class="text-sm"># Navigate to your Soobu themes folder
cd path/to/soobu/themes

# Clone the Beauty theme
git clone https://github.com/sirdavis99/soobu-beauty-theme.git beauty

# Or use SSH
git clone git@github.com:sirdavis99/soobu-beauty-theme.git beauty</code></pre>
                      </div>
                      
                      <div class="mt-8 bg-purple-50 p-6 rounded-xl border border-purple-200">
                          <h3 class="font-bold text-purple-800 mb-3">
                              <i class="fas fa-info-circle mr-2"></i>After Installation
                          </h3>
                          <ul class="space-y-2 text-purple-700">
                              <li>1. Activate the Beauty theme in Soobu admin panel</li>
                              <li>2. Customize settings through Theme Settings</li>
                              <li>3. Add your products and categories</li>
                              <li>4. Launch your beautiful store!</li>
                          </ul>
                      </div>
                  </div>
              </section>

              <!-- Footer -->
              <footer class="bg-gray-900 text-white py-12">
                  <div class="container mx-auto px-6 text-center">
                      <h3 class="text-2xl font-bold mb-4">Beauty Theme for Soobu</h3>
                      <p class="text-gray-400 mb-6">A beautiful theme for your e-commerce store</p>
                      <div class="flex justify-center gap-6 mb-8">
                          <a href="https://github.com/sirdavis99/soobu-beauty-theme" class="text-gray-400 hover:text-white transition">
                              <i class="fab fa-github text-2xl"></i>
                          </a>
                      </div>
                      <p class="text-gray-500 text-sm">
                          © 2025 Beauty Theme. Built for Soobu Platform.
                      </p>
                  </div>
              </footer>
          </body>
          </html>
          EOF

      - name: Create 404 page
        run: |
          cp docs/index.html docs/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4